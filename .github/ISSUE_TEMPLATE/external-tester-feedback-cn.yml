name: 外部试用反馈
description: 反馈 Agent Memory Lab 本地工作台或浏览器插件试用问题
title: "[外部试用] "
labels: [external-feedback]
body:
  - type: markdown
    attributes:
      value: |
        谢谢你试用 Agent Memory Lab。请不要粘贴私人聊天全文、Cookie、访问令牌、API Key、学校申请材料或任何敏感页面内容。

  - type: input
    id: version
    attributes:
      label: 插件 / 项目版本
      description: 可以从插件弹窗、`npm run status:delivery` 或提交号里找到。
      placeholder: Agent Memory Lab 0.1.0 / commit d8389f2
    validations:
      required: true

  - type: dropdown
    id: path
    attributes:
      label: 试用路径
      options:
        - 本地 demo 页面
        - ChatGPT
        - Claude
        - Gemini
        - Perplexity
        - Grok
        - DeepSeek
        - Viewer 工作台
        - 插件打包 / 加载
        - 其他
    validations:
      required: true

  - type: input
    id: environment
    attributes:
      label: 环境
      placeholder: macOS 15 / Chrome 版本号 / Edge 版本号
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: 你期待发生什么
      placeholder: 例如：输入框旁出现记忆建议，点击插入后不影响原站发送。
    validations:
      required: true

  - type: textarea
    id: actual
    attributes:
      label: 实际发生了什么
      placeholder: 例如：侧栏显示输入框未找到，或保存后 Viewer 待审阅没有出现。
    validations:
      required: true

  - type: textarea
    id: diagnostics
    attributes:
      label: 诊断 JSON 或证据文件名
      description: 可以粘贴同步侧栏“复制诊断”的 JSON，或写 `docs/validation/browser-extension-ai-sites/YYYY-MM-DD-provider.json`。AI 页面问题请保留 `turnCount` 和 `matchedSelectors.turn`，但先删掉隐私内容。
      render: json
      placeholder: |
        {
          "ai": {
            "turnCount": 0,
            "matchedSelectors": {
              "turn": ""
            }
          },
          "manualValidation": {
            "memoryInsertPassed": false,
            "diagnosticsCopied": true,
            "siteInputStillWorks": false
          }
        }

  - type: checkboxes
    id: validation
    attributes:
      label: 手动验收
      options:
        - label: 我已确认反馈内容不包含敏感信息。
          required: true
        - label: 如果这是 AI 页面问题，我已尝试复制同步侧栏诊断 JSON。
        - label: 如果这是 AI 页面问题，我已确认页面里至少有一轮真实对话，候选记忆不是页面标题、链接或输入框草稿。
        - label: 如果这是插入问题，我已确认原站输入框和发送按钮是否仍然正常。

  - type: dropdown
    id: impact
    attributes:
      label: 影响程度
      options:
        - 阻断试用
        - 影响核心体验
        - 小问题
        - 建议优化
    validations:
      required: true
