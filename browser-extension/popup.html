<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Agent Memory Lab</title>
  <link rel="stylesheet" href="popup.css" />
</head>
<body>
  <main class="panel">
    <header>
      <div>
        <h1>Agent Memory Lab</h1>
        <p id="status">正在检查本地服务...</p>
      </div>
      <button id="openOptions" class="icon-btn" title="设置" aria-label="设置">⚙</button>
    </header>

    <section class="trial-card">
      <div>
        <div class="label">本地工作台</div>
        <div id="versionInfo" class="trial-title">Extension v0.1.0</div>
      </div>
      <div id="trialText" class="trial-text">内容会先进入本地工作台待审阅，由你确认后再写入长期记忆。</div>
    </section>

    <section class="page-card">
      <div class="label">当前网页</div>
      <div id="pageTitle" class="title">读取中...</div>
      <div id="pageUrl" class="url"></div>
    </section>

    <section class="review-card">
      <div class="review-head">
        <div>
          <div class="label">待确认内容</div>
          <div class="hint">只保存具体事实、偏好、决定或待办。</div>
        </div>
        <button id="resetDraft" class="text-button" type="button">重置</button>
      </div>
      <input id="draftTitle" class="draft-input" type="text" placeholder="一句话标题" />
      <textarea id="draftContent" rows="5" placeholder="正在整理这页值得记住的内容..."></textarea>
      <div class="draft-fields">
        <label>
          <span>保存范围</span>
          <select id="draftProject">
            <option value="all">以后都能用</option>
            <option value="page">只和这个网页相关</option>
          </select>
        </label>
        <label>
          <span>分类备注</span>
          <input id="draftTags" type="text" placeholder="例如：学习、产品、设计" />
        </label>
      </div>
      <label class="draft-check">
        <input id="draftAsLesson" type="checkbox" />
        <span>整理成可复用经验</span>
      </label>
      <div id="draftMeta" class="draft-meta"></div>
      <button id="saveMemory" class="primary wide">加入待确认</button>
    </section>

    <div class="actions">
      <button id="openSidePanel">打开同步侧栏</button>
      <button id="openWorkbench">打开工作台</button>
    </div>

    <section class="recent-card">
      <div class="label">最近保存</div>
      <div id="recentList" class="recent-list">暂无记录</div>
    </section>

    <div id="message" class="message"></div>
  </main>
  <script type="module" src="popup.js"></script>
</body>
</html>
