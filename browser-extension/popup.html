<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Agent Memory Lab</title>
  <link rel="stylesheet" href="popup.css" />
</head>
<body>
  <main class="panel">
    <header>
      <div>
        <h1>Agent Memory Lab</h1>
        <p id="status">正在检查本地服务...</p>
      </div>
      <button id="openOptions" class="icon-btn" title="设置" aria-label="设置">⚙</button>
    </header>

    <section class="trial-card">
      <div>
        <div class="label">本地工作台</div>
        <div id="versionInfo" class="trial-title">Extension v0.1.0</div>
      </div>
      <button id="openGuide" class="text-button" type="button">使用指南</button>
      <div id="trialText" class="trial-text">内容会先进入本地工作台待审阅，由你确认后再写入长期记忆。</div>
    </section>

    <section class="page-card">
      <div class="label">当前网页</div>
      <div id="pageTitle" class="title">读取中...</div>
      <div id="pageUrl" class="url"></div>
    </section>

    <section class="review-card">
      <div class="review-head">
        <div>
          <div class="label">待审阅草稿</div>
          <div class="hint">保存前可以先改成你希望 Agent 记住的说法。</div>
        </div>
        <button id="resetDraft" class="text-button" type="button">重置</button>
      </div>
      <input id="draftTitle" class="draft-input" type="text" placeholder="记忆标题" />
      <textarea id="draftContent" rows="5" placeholder="正在生成候选记忆..."></textarea>
      <div class="draft-fields">
        <label>
          <span>项目</span>
          <select id="draftProject">
            <option value="all">全部项目</option>
            <option value="page">当前网页来源</option>
          </select>
        </label>
        <label>
          <span>标签</span>
          <input id="draftTags" type="text" placeholder="browser, ai" />
        </label>
      </div>
      <label class="draft-check">
        <input id="draftAsLesson" type="checkbox" />
        <span>同时标记为可沉淀经验</span>
      </label>
      <div id="draftMeta" class="draft-meta"></div>
      <button id="saveMemory" class="primary wide">送到工作台审阅</button>
    </section>

    <div class="actions">
      <button id="openSidePanel">打开同步侧栏</button>
      <button id="openWorkbench">打开记忆库</button>
      <button id="openSkills">打开 Skill 管理</button>
    </div>

    <label class="lesson-box">
      <span>补充一条经验</span>
      <textarea id="lessonNote" rows="3" placeholder="例如：这个页面的排版适合借鉴为项目介绍结构。"></textarea>
      <button id="saveLesson">加入待审阅</button>
    </label>

    <section class="recent-card">
      <div class="label">最近保存</div>
      <div id="recentList" class="recent-list">暂无记录</div>
    </section>

    <div id="message" class="message"></div>
  </main>
  <script type="module" src="popup.js"></script>
</body>
</html>
