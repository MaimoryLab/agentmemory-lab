<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Agent Memory Lab Side Panel</title>
  <link rel="stylesheet" href="sidepanel.css" />
</head>
<body>
  <main class="shell">
    <header class="topbar">
      <div class="brand-mark" aria-hidden="true">M</div>
      <div class="brand-copy">
        <h1>记忆同步</h1>
        <p id="status">正在连接本地工作台...</p>
      </div>
      <button id="refresh" class="icon-button" title="刷新" aria-label="刷新">↻</button>
    </header>

    <section id="connectionCard" class="connection-card checking">
      <div>
        <div id="connectionTitle" class="connection-title">检查连接中</div>
        <div id="connectionText" class="connection-text">正在确认能否保存到本地工作台。</div>
      </div>
      <button id="connectionAction" type="button">重试</button>
    </section>

    <section class="section current-page">
      <div class="section-head">
        <span class="eyebrow">当前页面</span>
        <span id="pageType" class="type-pill">网页</span>
      </div>
      <h2 id="pageTitle">读取中...</h2>
      <p id="pageUrl" class="url"></p>
      <div id="privacy" class="privacy low">隐私风险低</div>
    </section>

    <section class="section ai-diagnostics" id="aiDiagnostics" hidden>
      <div class="section-head">
        <span class="eyebrow">站点验收</span>
        <div class="section-actions">
          <button id="openTestCards" class="ghost-button" type="button">测试卡</button>
          <button id="copyEvidenceCommand" class="ghost-button" type="button" disabled>复制检查步骤</button>
          <button id="copyDiagnostics" class="ghost-button" type="button" disabled>复制问题信息</button>
          <span id="aiProvider" class="type-pill">AI</span>
        </div>
      </div>
      <div id="aiValidationSummary" class="validation-summary"></div>
      <div id="aiValidationSteps" class="validation-steps"></div>
      <div id="aiDiagnosticList" class="diagnostic-list"></div>
      <div id="evidenceCommandHint" class="command-hint" hidden>如果网页识别不准，先复制问题信息，再复制检查步骤。</div>
    </section>

    <section class="section review-draft">
      <div class="section-head">
        <span class="eyebrow">准备保存</span>
        <button id="resetDraft" class="ghost-button" type="button">重置</button>
      </div>
      <input id="draftTitle" class="draft-input" type="text" placeholder="一句话标题" />
      <textarea id="draftContent" rows="5" placeholder="选择一条建议，或直接改写要保存的内容。"></textarea>
      <div class="draft-fields">
        <label>
          <span>保存范围</span>
          <select id="draftProject">
            <option value="all">以后都能用</option>
            <option value="page">只和这个网页相关</option>
          </select>
        </label>
        <label>
          <span>分类备注</span>
          <input id="draftTags" type="text" placeholder="例如：学习、产品、设计" />
        </label>
      </div>
      <label class="draft-check">
        <input id="draftAsLesson" type="checkbox" />
        <span>整理成可复用经验</span>
      </label>
      <div id="draftMeta" class="draft-meta">保存后仍需在工作台确认。</div>
    </section>

    <section class="section">
      <div class="section-head">
        <span class="eyebrow">可以记住</span>
        <span class="count" id="memoryCount">0</span>
      </div>
      <div id="memoryCandidates" class="candidate-list empty">暂时没有建议</div>
    </section>

    <section class="section">
      <div class="section-head">
        <span class="eyebrow">可以沉淀</span>
        <span class="count" id="lessonCount">0</span>
      </div>
      <div id="lessonCandidates" class="candidate-list empty">暂时没有建议</div>
    </section>

    <section class="section chat-section" id="chatSection" hidden>
      <div class="section-head">
        <span class="eyebrow">最近对话</span>
        <span class="count" id="turnCount">0</span>
      </div>
      <div id="turnList" class="turn-list"></div>
    </section>

    <section class="section">
      <div class="section-head">
        <span class="eyebrow">最近同步</span>
      </div>
      <div id="recentList" class="recent-list empty">暂无记录</div>
    </section>

    <footer class="footer-actions">
      <button id="savePage" class="primary">加入待确认</button>
      <button id="openWorkbench">工作台</button>
      <button id="openSkills">能力库</button>
    </footer>

    <div id="message" class="message"></div>
  </main>
  <script type="module" src="sidepanel.js"></script>
</body>
</html>
