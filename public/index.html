<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>AI-Todo</title>
    <link rel="stylesheet" href="/app.css">
  </head>
  <body>
    <nav class="tabs" aria-label="AI-Todo views">
      <button class="active" data-view="dashboard" aria-current="page">
        <span class="tab-icon" aria-hidden="true"><svg viewBox="0 0 24 24" fill="none" stroke-width="1.9" stroke-linecap="round" stroke-linejoin="round"><path d="M4 4h7v7H4zM13 4h7v5h-7zM13 12h7v8h-7zM4 14h7v6H4z"/></svg></span>
        <span>Overview</span>
      </button>
      <button data-view="todos">
        <span class="tab-icon" aria-hidden="true"><svg viewBox="0 0 24 24" fill="none" stroke-width="1.9" stroke-linecap="round" stroke-linejoin="round"><path d="M5 12h14"/><path d="M13 6l6 6-6 6"/></svg></span>
        <span>To-Do</span>
      </button>
      <button data-view="evidence">
        <span class="tab-icon" aria-hidden="true"><svg viewBox="0 0 24 24" fill="none" stroke-width="1.9" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="5" width="18" height="14" rx="2"/><path d="M7 9h10M7 13h6"/></svg></span>
        <span>Evidence</span>
      </button>
    </nav>

    <main class="shell">
      <header class="topbar">
        <div>
          <h1>AI-Todo</h1>
          <p id="status">Loading local workspace...</p>
        </div>
        <div class="actions">
          <button id="scan-codex" type="button">Scan Codex</button>
          <button id="scan-claude" type="button">Scan Claude</button>
          <button id="organize" type="button" class="primary">Organize</button>
        </div>
      </header>

      <section id="dashboard" class="view active" aria-labelledby="dashboard-title">
        <h2 id="dashboard-title">Source Dashboard</h2>
        <div id="source-grid" class="stats-grid"></div>
        <h3>Sessions</h3>
        <div id="sessions" class="list"></div>
      </section>

      <section id="todos" class="view" aria-labelledby="todos-title">
        <h2 id="todos-title">Todos</h2>
        <div id="todo-list" class="list"></div>
      </section>

      <section id="evidence" class="view" aria-labelledby="evidence-title">
        <h2 id="evidence-title">Evidence</h2>
        <div id="evidence-list" class="list empty">Select a todo to inspect evidence.</div>
      </section>

    </main>

    <button id="settings-gear" class="settings-gear" type="button" aria-label="Settings" aria-expanded="false" title="Settings">
      <svg viewBox="0 0 24 24" fill="none" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
        <path d="M12 15.5A3.5 3.5 0 1 0 12 8a3.5 3.5 0 0 0 0 7.5Z"></path>
        <path d="M19.4 15a1.7 1.7 0 0 0 .34 1.88l.06.06a2 2 0 0 1-2.83 2.83l-.06-.06A1.7 1.7 0 0 0 15 19.4a1.7 1.7 0 0 0-1 .6l-.03.08a2 2 0 0 1-3.94 0L10 20a1.7 1.7 0 0 0-1-.6 1.7 1.7 0 0 0-1.88.34l-.06.06a2 2 0 1 1-2.83-2.83l.06-.06A1.7 1.7 0 0 0 4.6 15a1.7 1.7 0 0 0-.6-1l-.08-.03a2 2 0 0 1 0-3.94L4 10a1.7 1.7 0 0 0 .6-1 1.7 1.7 0 0 0-.34-1.88l-.06-.06a2 2 0 1 1 2.83-2.83l.06.06A1.7 1.7 0 0 0 9 4.6a1.7 1.7 0 0 0 1-.6l.03-.08a2 2 0 0 1 3.94 0L14 4a1.7 1.7 0 0 0 1 .6 1.7 1.7 0 0 0 1.88-.34l.06-.06a2 2 0 1 1 2.83 2.83l-.06.06A1.7 1.7 0 0 0 19.4 9c.07.37.27.7.6 1l.08.03a2 2 0 0 1 0 3.94L20 14c-.33.3-.53.63-.6 1Z"></path>
      </svg>
    </button>
    <aside id="settings-panel" class="settings-panel" aria-hidden="true"></aside>

    <dialog id="organize-dialog">
      <form method="dialog">
        <header class="dialog-head">
          <h2>Organize Result</h2>
          <button aria-label="Close dialog">Close</button>
        </header>
        <div id="organize-result" class="result-grid"></div>
      </form>
    </dialog>

    <script src="/app.js" type="module"></script>
  </body>
</html>
